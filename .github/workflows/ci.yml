name: SoilGuard Portal CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        # libgl1-mesa-glx was removed in Ubuntu 24.04 (noble)
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev libgl1 libglib2.0-0

      - name: Install dependencies
        env:
          # Authenticate git so pip can clone private GitHub repos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install git+https://github.com/fivepanelhat/coastal-alpine-core.git
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run test suite
        run: |
          pytest
