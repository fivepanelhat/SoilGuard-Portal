name: RedTeam Tests
on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
concurrency:
  group: redteam-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  redteam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run adversarial / security stress suite
        shell: bash
        # Replaces the previous job, which apt-installed a package that no
        # longer exists on ubuntu-latest (zaproxy) and pointed ZAP at
        # https://example.com — a third-party site we must not scan.
        run: |
          if compgen -G "tests/test_security_stress*.py" > /dev/null; then
            python -m pip install --upgrade pip
            pip install pytest requests
            if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
            python -m pytest tests/test_security_stress*.py -v --tb=short
          else
            echo "No local adversarial suite in this repo — nothing to run."
          fi
